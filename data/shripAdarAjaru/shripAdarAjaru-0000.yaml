id: shripAdarAjaru-0000
title:
  kannada: ಕಂಗಳಿದ್ಯಾತಕೋ ಕಾವೇರಿ ರಂಗನ ನೋಡದ

composer:
  kannada: ಶ್ರೀಪಾದರಾಜರಾಜರು
ankita_nama:
  kannada: ರಂಗವಿಠಲ
type: DevaranAma
raaga:
taala:
deity: krishna

# The Content Structure
sections:
  - pallavi: |
      ಕಂಗಳಿದ್ಯಾತಕೋ ಕಾವೇರಿ ರಂಗನ ನೋಡದ || ಪ||

  - anupallavi: |
      ಗಂಗಳೊಳಗೆ ಮಂಗಳ ಮೂರುತಿ
      ರಂಗನ ಶ್ರೀಪಾದಂಗಳ ನೋಡದ ||ಅ.ಪ||

  - charana:
      - stanza: 1
        text: |
          ಎಂದಿಗಾದರೊಮ್ಮೆ ಜನರು
          ಬಂದು ಭೂಮಿಯಲಿ ನಿಂದು
          ಚಂದ್ರಪುಷ್ಕರಣಿ ಸ್ನಾನವ ಮಾಡಿ ಆ-
          ನಂದದಿಂದಲಿ ರಂಗನ ನೋಡದ ||೧||

      - stanza: 2
        text: |
          ಹರಿಪಾದೋದಕ ಸಮ ಕಾವೇರಿ
          ವಿರಜಾನದಿ ಸ್ನಾನವ ಮಾಡಿ
          ಪರಮ ವೈಕುಂಠ ರಂಗಮಂದಿರ
          ಪರವಾಸುದೇವನ ನೋಡದ ||೨||
      - stanza: 3
        text: |
          ಹಾರ ಹೀರ ವೈಜಯಂತಿ
          ತೋರ ಮುತ್ತಿನ ಹಾರವ ಧರಿಸಿ
          ತೇರನೇರಿ ಬೀದಿಲಿ ಮೆರೆವ
          ರಂಗವಿಠಲನ ನೋಡದ ||೩||
