id: shripAdarAjaru-0022
title:
  kannada: ಶ್ರೀ ರಾಮ ನಿನ್ನ ಪಾದವ ತೋರೋ

composer:
  kannada: ಶ್ರೀಪಾದರಾಜರಾಜರು
ankita_nama:
  kannada: ರಂಗವಿಠಲ
type: DevaranAma
raaga:
taala:

sections:
  - pallavi: |
      ಶ್ರೀ ರಾಮ ನಿನ್ನ ಪಾದವ ತೋರೋ
      ಮೋಹನ್ನ ಗುಣಧಾಮ ನಿನ್ನ ಮೋಹದ ಪಾದವ ||ಪ||

  - anupallavi:

  - charana:
      - stanza: 1
        text: |
          ವರಗುಣಜಾಲ ಸುರಗುಣಲೋಲ
          ಕರುಣಾಲವಾಲ ತರುಣೀ ಪರಿಪಾಲ ||೧||
      - stanza: 2
        text: |
          ಅಜಭವಪೂಜಿತ ಗಜವರಭಾವಿತ
          ಸುಜನರ ಸೇವಿತ ತ್ರಿಜಗವಂದಿತ ||೨||
      - stanza: 3
        text: |
          ಅಂಗಜ ಜನಕ ವಿಹಂಗತುರಂಗ
          ತುಂಗವಿಕ್ರಮ ಶ್ರೀರಂಗವಿಠಲ ||೩||
