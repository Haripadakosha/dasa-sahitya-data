id: shripAdarAjaru-0006
title:
  kannada: ಆಡಲು ಪೋಗೊಣು ಬಾರೊ ರಂಗ

composer:
  kannada: ಶ್ರೀಪಾದರಾಜರಾಜರು
ankita_nama:
  kannada: ರಂಗವಿಠಲ
type: DevaranAma
raaga:
taala:

sections:
  - pallavi: |
      ಆಡಲು ಪೋಗೊಣು ಬಾರೊ ರಂಗ
      ಕೂಡಿ ಯಮುನಾ ತೀರದಲ್ಲಿ ||ಪ||
  - charana:
      - stanza: 1
        text: |
          ಚಿಣ್ಣಿಕೋಲು ಚೆಂಡು ಬುಗರಿ
          ಸಣ್ಣ ಸಣ್ಣ ಆಟಗಳನು
          ಕಣ್ಣಮುಚ್ಚಲಿಕೆ ಕುಂಟಲಿಪಿ
          ಬಣ್ಣ ಬಣ್ಣದ ಆಟಗಳನು ||೧||
      - stanza: 2
        text: |
          ಜಾಹ್ನವಿಯ ತೀರವಂತೆ
          ಜನಕರಾಜನ ಕುವರಿಯಂತೆ
          ಜಾನಕಿಯ ವಿವಾಹವಂತೆ
          ಜಾಣ ನೀನು ಬರಬೇಕಂತೆ ||೨||
      - stanza: 3
        text: |
          ಪುಂಡರೀಯ ನಗರವಂತೆ
          ಭೀಷ್ಮಕರಾಜನ ಕುವರಿಯಂತೆ
          ಶಿಶುಪಾಲನ್ನ ಒಲ್ಲಳಂತೆ
          ನಿಮಗೆ ಓಲೆ ಬರೆದಳಂತೆ||೩||
      - stanza: 4
        text: |
          ಕೌರವರು ಪಾಂಡವರು
          ಲೆತ್ತವಾಡಿ ಸೋತರಂತೆ
          ರಾಜ್ಯವನ್ನು ಬಿಟ್ಟರಂತೆ
          ರಂಗವಿಠಲ ಬರಬೇಕಂತೆ ||೪||
