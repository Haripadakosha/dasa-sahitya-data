id: shripAdarAjaru-0025
title:
  kannada: ಇದಿರದಾವನು ನಿನಗೀ ಧರೆಯೊಳು ಪದುಮನಾಭನ ದಾಸ ಪರಮೋಲ್ಲಾಸಾ

composer:
  kannada: ಶ್ರೀಪಾದರಾಜರಾಜರು
ankita_nama:
  kannada: ರಂಗವಿಠಲ
type: DevaranAma
raaga:
taala:

sections:
  - pallavi: |
      ಇದಿರದಾವನು ನಿನಗೀ ಧರೆಯೊಳು
      ಪದುಮನಾಭನ ದಾಸ ಪರಮೋಲ್ಲಾಸಾ ||ಪ||
  - anupallavi:
  - charana:
      - stanza: 1
        text: |
          ವಾದಿತಿಮಿರಮಾರ್ತಾಂಡನೆಂದೆನಿಸಿದ
          ವಾದಿಶರಭಭೇರುಂಡ ವ್ಯಾಸರಾಯಾ ||೧||
      - stanza: 2
        text: |
          ಯತಿಗಳೊಳಗೆ ನಿಮ್ಮಂದದದವರುಗಳ
          ಪ್ರತಿಗಾಣೆನು ಈ ಕ್ಷಿತಿಯೊಳು ಯತಿರಾಯಾ ||೨||
      - stanza: 3
        text: |
          ಹಮ್ಮನಳಿದು ಶ್ರೀಪತಿ ರಂಗವಿಠಲನ್ನ
          ಸುಮ್ಮಾನದಿಂ ಸೇವಿಪ ವ್ಯಾಸಮುನಿರಾಯಾ ||೩||
