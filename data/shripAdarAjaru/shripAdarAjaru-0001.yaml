id: shripAdarAjaru-0001
title:
  kannada: ಕಂಗಳಿದ್ಯಾತಕೋ ಕಾವೇರಿ ರಂಗನ ನೋಡದ

composer:
  kannada: ಶ್ರೀಪಾದರಾಜರಾಜರು
ankita_nama:
  kannada: ರಂಗವಿಠಲ
type: DevaranAma
raaga:
taala:

# The Content Structure
sections:
  - pallavi: |
      ಕಂಗಳಿದ್ಯಾತಕೋ ಕಾವೇರಿ ರಂಗನ ನೋಡದ

  - anupallavi: |
      ಗಂಗಳೊಳಗೆ ಮಂಗಳ ಮೂರುತಿ
      ರಂಗನ ಶ್ರೀಪಾದಂಗಳ ನೋಡದ

  - charana:
      - stanza: 1
        text: |
          ಎಂದಿಗಾದರೊಮ್ಮೆ ಜನರು
          ಬಂದು ಭೂಮಿಯಲಿ ನಿಂದು
          ಚಂದ್ರಪುಷ್ಕರಣಿ ಸಾನವ ಮಾಡಿ ಆ
          ನಂದದಿಂದಲಿ ರಂಗನ ನೋಡದ

      - stanza: 2
        text: |
          ಹರಿಪಾದೋದಕ ಸಮ ಕಾವೇರಿ
          ವಿರಜಾನದಿ ಸಾನವ ಮಾಡಿ
          ಪರಮ ವೈಕುಂಠ ರಂಗಮಂದಿರ
          ಪರವಾಸುದೇವನ ನೋಡದ
      - stanza: 3
        text: |
          ಹಾರ ಹೀರ ವೈಜಯಂತಿ
          ತೋರ ಮುತ್ತಿನ ಹಾರವ ಧರಿಸಿ
          ತೇರನೇರಿ ಬೀದಿಲಿ
          ಮೆರೆವ ರಂಗವಿಠಲನ ನೋಡದ
