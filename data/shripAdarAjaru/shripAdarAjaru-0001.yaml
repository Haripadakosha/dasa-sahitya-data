id: shripAdarAjaru-0001
title:
  kannada: ಮರುದಂಶರ ಮತ ಪಿಡಿಯದೆ ಇಹ -ಪರದಲ್ಲಿ ಸುಖವಿಲ್ಲವಂತೆ

composer:
  kannada: ಶ್ರೀಪಾದರಾಜರಾಜರು
ankita_nama:
  kannada: ರಂಗವಿಠಲ
type: DevaranAma
raaga:
taala:

# The Content Structure
sections:
  - pallavi: |
      ಮರುದಂಶರ ಮತ ಪಿಡಿಯದೆ ಇಹ -ಪರದಲ್ಲಿ ಸುಖವಿಲ್ಲವಂತೆ || ಪ||

  - anupallavi: |
      ಅರಿತು ವಿವೇಕದಿ ಮರೆಯದೆ ನಮ್ಮಗುರುರಾಯರ ನಂಬಿ ಬದುಕಿರೋ ||ಅ.ಪ||

  - charana:
      - stanza: 1
        text: |
          ಕ್ಷೀರವ ಕರೆದಿಟ್ಟ ಮಾತ್ರದಿ ಸಂಸ್ಕಾರವಿಲ್ಲದೆ ಘೃತವಾಗದಂತೆ
          ಸೂರಿಜನರ ಸಂಗವಿಲ್ಲದೆ ಸಾರವೈರಾಗ್ಯ ಭಾಗ್ಯ ಪುಟ್ಟದಂತೆ ||೧||
      - stanza: 2
        text: |
          ಉಪದೇಶವಿಲ್ಲದ ಮಂತ್ರ ಏಸುಜಪಿಸಲು ಫಲಗಳ ಕೊಡದಂತೆ
          ಉಪವಾಸ ವ್ರತಗಳಿಲ್ಲದೆ ಜೀವತಪಸಿಯೆನಿಸಿಕೊಳ್ಳಲರಿಯನಂತೆ ||೨||
      - stanza: 3
        text: |
          ಸಾರಮಧ್ವಶಾಸ್ತ್ರವೋದದೆ ಗುರುತಾರತಮ್ಯ ಸುಜ್ಞಾನ ಪುಟ್ಟದಂತೆ
          ಶ್ರೀರಂಗವಿಠಲನ ಭಜಿಸದೆ ಮುಂದೆಪರಮಗತಿ ದೊರಕೊಳ್ಳದಂತೆ ||೩||
