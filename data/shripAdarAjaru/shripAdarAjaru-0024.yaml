id: shripAdarAjaru-0024
title:
  kannada: ಮೋಸ ಹೋದೆನಲ್ಲ ಸಕಲವು ವಾಸುದೇವ ಬಲ್ಲ

composer:
  kannada: ಶ್ರೀಪಾದರಾಜರಾಜರು
ankita_nama:
  kannada: ರಂಗವಿಠಲ
type: DevaranAma
raaga:
taala:

sections:
  - pallavi: |
      ಮೋಸ ಹೋದೆನಲ್ಲ ಸಕಲವು ವಾಸುದೇವ ಬಲ್ಲ
      ಭಾಸುರಾಂಗ ಶ್ರೀ ವಾಸುಕಿಶಯನನ
      ಸಾಸಿರ ನಾಮವ ಲೇಸಾಗಿ ಪಠಿಸದೆ||ಪ|
  - anupallavi:
  - charana:
      - stanza: 1
        text: |
          ದುಷ್ಟ ಜನರ ಕೂಡಿ ನಾನತಿ
          ಭ್ರಷ್ಟನಾದೆ ನೋಡಿ
          ಶ್ರೇಷ್ಠರೂಪ ಮುರ ಮುಷ್ಟಿಕ ವೈರಿಯ
          ನಿಷ್ಠೆಯಿಂದ ನಾ ದೃಷ್ಟಿಸಿ ನೋಡದೆ ||೧||
      - stanza: 2
        text: |
          ಕಾಯವು ಸ್ಥಿರವಲ್ಲ ಎನ್ನೊಳು
          ಮಾಯೆ ತುಂಬಿತಲ್ಲ
          ಪ್ರಾಯಮದದಿ ಪರಸ್ತ್ರೀಯರ ಕೂಡಾಡಿ
          ಕಾಯಜಜನಕನ ಗಾಯನ ಮಾಡದೆ ||೨||
      - stanza: 3
        text: |
          ಕಂಗಳಿಂದಲಿ ನೋಡೋ ದೇವ ನಿ
          ನ್ನಂಗಸಂಗವ ನೀಡೋ
          ಮಂಗಳಮಹಿಮ ಶ್ರೀರಂಗವಿಠಲ ಮುಂ
          ದಂಗಬಾರದಂತೆ ನೀ ದಯ ಮಾಡೋ ||೩||
