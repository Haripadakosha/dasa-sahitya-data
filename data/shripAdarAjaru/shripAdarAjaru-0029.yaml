id: shripAdarAjaru-0029
title:
  kannada: ದುರಿತಗಜ ಪಂಚಾನನ-ನರಹರಿಯೆ

composer:
  kannada: ಶ್ರೀಪಾದರಾಜರಾಜರು
ankita_nama:
  kannada: ರಂಗವಿಠಲ
type: DevaranAma
raaga:
taala:

sections:
  - pallavi: |
      ದುರಿತಗಜ ಪಂಚಾನನ-ನರಹರಿಯೆ ದೇವರ ದೇವ ಕಾಯೊ ಗೋವಿಂದ ||ಪ||

  - anupallavi:

  - charana:
      - stanza: 1
        text: |
          ಹೆಸರುಳ್ಳ ನದಿಗಳು ಒಳಗೊಂಬೊ ಸಮುದ್ರನುಬಿಸುಡುವನೆ ಕಾಲುಹೊಳೆಗಳ ಗೋವಿಂದ ||1||
      - stanza: 2
        text: |
          ಒಂದು ಮೊಲಕೆ ಆರು ಹುಲಿ ಬಂದು ಕವಿದಿದೆಬಂಧನ ಬಿಡೆಸೆನ್ನ ತಂದೆ ಗೋವಿಂದ ||2||
      - stanza: 3
        text: |
          ಹೆತ್ತ ಮಕ್ಕಳು ಹುಚ್ಚರಾದರೆ ತಾಯಿ ತಂದೆಎತ್ತದೆ ನೆಲಕೆ ಬಿಸುಡುವರೆ ಗೋವಿಂದ ||3||
      - stanza: 4
        text: |
          ಮುನ್ನ ಮಾಡಿದ ಕರ್ಮ ಬೆನ್ನ ಬಿಡದಿದ್ದರೆನಿನ್ನ ವಾಲೈಸಲ್ಯಾಕೆ ಗೋವಿಂದ||4||
      - stanza: 5
        text: |
          ಆಪತ್ತು ತಾಪತ್ರಯ ಬೆನ್ನ ಬಿಡದಿದ್ದರೆಶ್ರೀಪತಿ ಶರಣೆನ್ನಲ್ಯಾಕೆ ಗೋವಿಂದ||5||
      - stanza: 6
        text: |
          ಅರಸು ಮುಟ್ಟಲು ದಾಸಿ ರಂಭೆಯಾದಳು ದೇವಪರುಷ ಮುಟ್ಟಲು ಲೋಹ ಸ್ವರ್ಣ ಗೋವಿಂದ ||6||
      - stanza: 7
        text: |
          ಮಾನಾಭಿಮಾನದೊಡೆಯ ರಂಗವಿಠಲ ಜ್ಞಾನಿಗಳರಸನೆ ಕಾಯೋ ಗೋವಿಂದ ||7||
