id: shripAdarAjaru-0013
title:
  kannada: ಹರೇ ವೆಂಕಟಶೈಲ ವಲ್ಲಭ ಪೊರೆಯಬೇಕು ಎನ್ನ

composer:
  kannada: ಶ್ರೀಪಾದರಾಜರಾಜರು
ankita_nama:
  kannada: ರಂಗವಿಠಲ
type: DevaranAma
raaga:
taala:

sections:
  - pallavi: |
      ಹರೇ ವೆಂಕಟಶೈಲ ವಲ್ಲಭ
      ಪೊರೆಯಬೇಕು ಎನ್ನ ||ಪ||

  - anupallavi: |
      ದುರಿತದೂರ ನೀನಲ್ಲದೆ ಧರೆಯೊಳು
      ಪೊರೆವರ ನಾ ಕಾಣೆ ನಿನ್ನಾಣೆ ||ಅ.ಪ||

  - charana:
      - stanza: 1
        text: |
          ಆರು ನಿನ್ನ ಹೊರತೆನ್ನ ಪೊರೆವರು
          ನೀರಜಾಕ್ಷ ಹರಿಯೆ ಅ-
          ಪಾರಮಹಿಮ ಪುರಾಣಪುರುಷ
          ಘೋರ ದುರಿತಗಳ ದೂರ ಮಾಡಿಸೋ ||೧||
      - stanza: 2
        text: |
          ಇಂದಿರೇಶ ಅರವಿಂದನಯನ ಎನ್ನ
          ತಂದೆ ತಾಯಿ ನೀನೆ
          ಹೊಂದಿದವರ ಅಘವೃಂದ ಕಳೆವ
          ಮಂದರಾದ್ರಿಧರನೇ ಶ್ರೀಧರನೆ ||೨||
      - stanza: 3
        text: |
          ಮಂಗಳಾಂಗ ಮಹನೀಯ ಗುಣಾರ್ಣವ
          ಗಂಗೋದಿತ ಪಾದ
          ಅಂಗಜಪಿತ ಅಹಿರಾಜಶಯ್ಯ ಶ್ರೀ
          ರಂಗವಿಠಲ ದೊರೆಯೇ ಶ್ರೀ ಹರಿಯೇ ||೩||
