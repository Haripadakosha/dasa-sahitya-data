id: vijayadAsa-0001
title:
  kannada: ನರಸಿಂಹ ಸುಳಾದಿ

composer:
  kannada: ವಿಜಯ ದಾಸರು
ankita_nama:
  kannada: ವಿಜಯವಿಠಲ
type: SulAdi

# The Content Structure
sections:
  - tala: ಧ್ರುವತಾಳ
    text: |
      ವೀರಸಿಂಹನೆ ನಾರಸಿಂಹನೆ ದಯಾಪಾರಾ-
      ವಾರನೆ ಭಯನಿವಾರಣ ನಿರ್ಗುಣ
      ಸಾರಿದವರ ಸಂಸಾರವೃಕ್ಷದ ಮೂಲ
      ಬೇರರಿಸಿ ಕೇಳುವ ಬಿರುದು ಭಯಂಕರ
      ಘೋರಾವತಾರ ಕರಾಳವದನ ಅ-
      ಘೋರ ದುರಿತಸಂಹಾರ ಮಾಯಾಕಾರ
      ಕ್ರೂರದೈತ್ಯರ ಶೋಕಕಾರಣ ಉದುಭವ
      ಈರೇಳು ಭುವನ ಸಾಗರ ದೊಡಿಯ
      ಈ ರೌದ್ರನಾಮಾ ವಿಜಯವಿಠಲ ನರಸಿಂಗ
      ವೀರರಸೊತ್ತುಂಗ ಕಾರುಣ್ಯ ಪಾಂಗ

  - tala: ಮಟ್ಟತಾಳ
    text: |
      ಮಗುವಿನ ರಕ್ಕಸನು ಹಗಲಿರುಳು ಬಿಡದೆ
      ಹಗೆಯಿಂದಲಿ ಹೊಯ್ದನಗ ಪನ್ನಗ ವನಧಿ
      ಗಗನ ಮಿಗಿಲಾದ ಅಗಣಿತ ಬಾಧಿಯಲಿ
      ನೆಗದು ಒಗದು ಸಾವು ಬಗೆದುಕೊಲ್ಲುತಿರಲು ಹೇ
      ಜಗದವಲ್ಲಭನೆ ಸುಗುಣಾನಾದಿಗನೆ
      ನಿಗಮವಂದಿತನೆ ಪೊಗಳಿದ ಭಕುತರ
      ತಗಲಿ ತೊಲಗನೆಂದು ಮಿಗೆ ಕೂಗುತ್ತಿರಲು
      ಯುಗಯುಗದೊಳು ದಯಾಳುಗಳ ದೇವರ ದೇವ
      ಯುಗಾದಿಕೃತೆ ನಾಮ ವಿಜಯವಿಠಲ ಹೋ ಹೋ
      ಯುಗಳ ಕರವಮುಗಿದು ಮಗುವು ಮೊರೆಯಿಡಳು

  - tala: ರೂಪಕತಾಳ
    text: |
      ಕೇಳಿದಾಕ್ಷಣದಲ್ಲಿ ಲಾಲಿಸಿ, ಭಕ್ತನ್ನ-
      ಮೌಳಿ ವೇಗದಲಿ ಪಾಲಿಸುವೆನೆಂದು
      ತಾಳಿ ಸಂತೋಷವ ತೂಳಿ ತುಂಬಿದಂತೆ
      ಮೂರ್ಲೋಕದ ಪತಿ ವಾಲಯದಿಂದ ಸು-
      ಶೀಲ ದುರ್ಲಬಭನಾಮ ವಿಜಯವಿಠಲ ಪಂಚ
      ಮೌಳಿ ಮಾನವ ಕ೦ಭಸೀಳಿ ಮೂಡಿದ ದೇವ

  - tala: ಝಂಪೆತಾಳ
    text: |
      ಲಟಲಟಾ ಲಟಲಟಾ ಲಟಕಟಿಸಿ ವನಜಜಾಂಡ
      ಕಟಹ ಪಟಪಟ ಪ ಪುಟುಶ್ಕಟದಿ ಬಿಚ್ಚುತಿರಲು
      ಪುಟಪುಟಾ ಪುಟನೆಗೆದು ಚೇರಿ ಹಾರುತ್ತ ಪ-
      ಲ್ಕಟಿ ಕಟಾ ಕಟ ಕಡಿದು ರೋಷದಿಂದ
      ಬಿಟ ಮಿಟಿ ಮಿಟನೆ ರಕ್ತಾಕ್ಷಿಯಲ್ಲಿ ನೋಡಿ
      ತಟಿತ್ಕೋಟಿ ಊರ್ಭಟಕಗೆ  ಆರ್ಭಟವಾಗಿರಲು
      ಕುಟಿಲರಹಿತ ವ್ಯಕ್ತ ವಿಜಯವಿಠ್ಠಲ ಶಕ್ತ
      ದಿಟ ನಿಟಿಲನೇತ್ರ ಸುರಕಟಕಪರಿಪಾಲಾ

  - tala: ತ್ರಿವಿಡತಾಳ
    text: |
      ಬೊಬ್ಬಿರಿಯೇ ವೀರ ಧ್ವನಿಯಿಂದ ತನಿಗಿಡಿ
      ಹಬ್ಬಿ ಮುಂಚೋಣಿ ಉರಿ ಹೊರಗೆದ್ದು ಸುತ್ತೆ
      ಉಬ್ಬಸ ರವಿಗಾಗೆ ಅಬ್ಜಾಂಡ  ನಡುಗುತಿರೆ
      ಅಬ್ಧಿಸಪುತ ಉಕ್ಕಿ ಹೊರಚೆಲ್ಲಿ ಬರುತಿರೆ
      ಅಬ್ಜ ಭವಾದಿಗಳು ತಬ್ಬಬ್ಬಿ ಗೊಂಡಾರಿ
      ಅಬ್ಬರವೇನೆನುತ ನಭದ ಗೂಳೆಯು ತಗೆಯೆ
      ಶಬ್ದ ತುಂಬಿತು ಅವ್ಯಾಕೃತಾಕಾಶ ಪರಿಯಂತ
      ನಿಬ್ಬರ ತರುಗಿರಿ ಝರಿ ಝರಿಸಲು
      ಒಬ್ಬರಿಗೊಶವಲ್ಲದ ನಮ್ಮಾ ವಿಜಯ ವಿಠ್ಠಲ
      ಇಬ್ಬಗೆಯಾಗಿ ಕಂಭದಿಂದ ಪೊರಮಟ್ಟಾ

  - tala: ಅಟ್ಟತಾಳ
    text: |
      ಘುಡಿಘುಡಿಸುತ ಕೋಟಿ ಸಿಡಿಲು ಗಿರಿಗೆ ಬಂದು
      ಹೊಡೆದಂತೆ ಚೀರಿ ಬೊಬ್ಬಿಡುತಲಿ ಲಂಘಿಸಿ
      ಹಿಡಿದು ರಕ್ಕಸನ್ನ ಕೆಡಹಿ ಮಡುಹಿ ತುಡುಕಿ
      ತೊಡೆಯ ಮೇಲಿರಿಸಿ ಹೇರೊಡಲ ಕೂರುಗುರದಿಂದ
      ಪಡುವಲ ಗಡಲ ತಡಿಯ ತರಣಿಯ ನೋಡಿ
      ಕಡುಕೋಪದಲ್ಲಿ ಸದಬಡಿದು ರಕ್ಕಸನ ಕೆಡಹಿ
      ನಿಡಿಗರಳನು ಕೊರಳೆಡಿಯಲ್ಲಿ ಧರಿಸಿದ ಸಡಗರದ ದೈವ
      ಕಡುಗಲಿ ಭೂರ್ಭೂವ ವಿಜಯ ವಿಠ್ಠಲ
      ಪಾಲ್ಗಡಲೊಡೆಯಾ ಶರಣರೋಡೆಯ ಒಡನೊಡನೆ

  - tala: ಆದಿತಾಳ
    text: |
      ಉರಿಮಸೆಗೆ ಚತುರ್ದಶ ಧರಣಿ ತಲ್ಲಣಿಸಲು
      ಪರಮೇಷ್ಟಿ ಹರಸುರರು ಸಿರಿದೇವಿಗೆ ಮೊರೆಯಿಡಲು
      ಕರುಣದಿಂದಲಿ ತನ್ನ ಶರಣನ್ನ ಸಹಿತ ನಿನ್ನ
      ಚರಣಕ್ಕೆ ಎರಗಲು ಪರಮ ಶಾಂತನಾಗಿ
      ಹರಹಿದೆ ದಯವನ್ನು ಸುರರು ಕುಸುಮ ವರುಷ
      ಗರಿಯಲು ಭೇರಿ ವಾದ್ಯ ಮೊರೆ ಉತ್ತರರೆ ಎನುತ
      ಪರಿಪರಿ ವಾಲಗ ವಿಸ್ತಾರದಿಂದ ಕೈಕೊಳ್ಳುತ್ತ
      ಮೆರೆದು ಸುರರುಪದ್ರ ಹರಿಸಿ ಬಾಲಕನ ಕಾಯ್ದೆ
      ಪರದೈವೆ ಗಂಭೀರಾತ್ಮ ವಿಜಯವಿಠ್ಠಲ ನಿಮ್ಮ
      ಚರಿತೆ ದುಷ್ಟರಿಗೆ ಭೀಕರವೋ ಸಜ್ಜನ ಪಾಲ

  - jate: |
      ಪ್ರಹ್ಲಾದವರದ ಪ್ರಪನ್ನ ಕ್ಲೇಶಭಂಜನ್ನ
      ಮಹಹವಿಷ ವಿಜಯವಿಠ್ಠಲ ನರಮೃಗವೇಷಾ
