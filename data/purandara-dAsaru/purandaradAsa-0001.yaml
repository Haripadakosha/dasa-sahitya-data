id: purandaradAsa-0001
title:
  kannada: ಸಕಲ ಗ್ರಹ ಬಲ ನೀನೆ ಸರಸಿಜಾಕ್ಷ

composer:
  kannada: ಪುರಂದರ ದಾಸರು
ankita_nama:
  kannada: ಪುರಂದರ ವಿಠಲ
type: DevaranAma
raaga: ಅಠಾಣ
taala: ಖಂಡ ಛಾಪು

# The Content Structure
sections:
  - pallavi: |
      ಸಕಲ ಗ್ರಹ ಬಲ ನೀನೆ ಸರಸಿಜಾಕ್ಷ
      ನಿಖಿಳ ರಕ್ಷಕ ನೀನೆ ವಿಶ್ವವ್ಯಾಪಕನೆ

  - anupallavi:

  - charana:
      - stanza: 1
        text: |
          ರವಿ ಚಂದ್ರ ಬುಧ ನೀನೆ ರಾಹು ಕೇತುವು ನೀನೆ
          ಕವಿ ಗುರು ಶನಿಯು ಮಂಗಳನು ನೀನೆ
          ದಿವ ರಾತ್ರಿಯು ನೀನೆ ನವ ವಿಧಾನವು ನೀನೆ
          ಭವರೋಗ ಹರ ನೀನೆ ಭೇಷಜನು ನೀನೆ
      - stanza: 2
        text: |
          ಪಕ್ಷ ಮಾಸವು ನೀನೆ ಪರ್ವ ಕಾಲವು ನೀನೆ
          ನಕ್ಷತ್ರ ಯೋಗ ತಿಥಿ ಕರಣಗಳು ನೀನೆ
          ಅಕ್ಷಯವೆಂದು ದ್ರೌಪದಿಯ ಮಾನವ ಕಾಯ್ದ
          ಪಕ್ಷಿವಾಹನ ದೀನ ರಕ್ಷಕನು ನೀನೆ
      - stanza: 3
        text: |
          ಋತುವತ್ಸರವು ನೀನೆ ವ್ರತ ಯುಗಾದಿಯು ನೀನೆ
          ಕ್ರತು ಹೋಮ ಯಜ್ಞ ಸದ್ಗತಿಯು ನೀನೆ
          ಜಿತವಾಗಿ ಎನ್ನೊಡೆಯ ಪುರಂದರ ವಿಠಲನೆ
          ಶ್ರುತಿಗೆ ಸಿಲುಕದ ಅಪ್ರತಿಮ ಮಹಿಮ ನೀನೆ
