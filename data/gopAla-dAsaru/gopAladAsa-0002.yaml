id: gopAladAsa-0002
title: ಆವ ರೋಗವೊ ಎನಗೆ ದೇವಧನ್ವಂತ್ರಿ

composer: ಗೋಪಾಲ ದಾಸರು
ankita_naama: ಗೋಪಾಲವಿಠಲ
type: DevaranAma
raaga: ಕಾನಡ
taala: ಖಂಡಛಾಪು

# The Content Structure
sections:
  - pallavi: ಆವ ರೋಗವೊ ಎನಗೆ ದೇವಧನ್ವಂತ್ರಿ

  - anupallavi: ಸಾವಧಾನದಿ ಕೈಯ ಪಿಡಿದು ನೀ ನೋಡಯ್ಯ

  - charana:
      - stanza: 1
        text: |
          ಹರಿಮೂರ್ತಿಗಳು ಕಾಣಿಸವು ಎನ್ನ ಕಂಗಳಿಗೆ
          ಹರಿಯ ಕೀರ್ತನೆಯು ಕೇಳಿಸದೆನ್ನ ಕಿವಿಗೆ 
          ಹರಿ ಮಂತ್ರ ಸ್ತೋತ್ರ ಬಾರದು ಎನ್ನ ನಾಲಿಗೆಗೆ
          ಹರಿ ಪ್ರಸಾದವು ಜಿಹ್ವೆಗೆ ಸವಿಯಾಗದಯ್ಯ

      - stanza: 2
        text: |
          ಹರಿಪಾದ ಸೇವೆಗೆನ್ನ ಹಸ್ತಗಳು ಚಲಿಸವು
          ಗುರುಹಿರಿಯರಂಘ್ರಿಗೆ ಶಿರ ಬಾಗದು ಹರಿಯ
          ನಿರ್ಮಾಲ್ಯವಾಘ್ರಾಣಿಸದು ನಾಸಿಕವು
          ಹರಿಯಾತ್ರೆಗಳಿಗೆನ್ನ ಕಾಲೇಳದಯ್ಯ
      - stanza: 3
        text: |
          ಅನಾಥಬಂಧು ಗೋಪಾಲವಿಠಲರೇಯ
          ಎನ್ನ ಭಾಗದ ವೈದ್ಯ ನೀನೆಯಾದೆ
          ಅನಾದಿ ಕಾಲದ ಭವರೋಗ ಕಳೆಯಯ್ಯ
          ನಾನೆಂದಿಗು ಮರೆಯೆ ನೀ ಮಾಡಿದುಪಕಾರ
